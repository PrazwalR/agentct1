name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node:
    name: TypeScript (typecheck, build, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Build first: @agentctl/server and @agentctl/cli import @agentctl/core, whose
      # package.json resolves types/main to ./dist. In a clean checkout that dir doesn't
      # exist until build runs, so typecheck must come after. pnpm -r build respects
      # workspace topological order (core before server/cli).
      - run: pnpm -r build
      - run: pnpm -r typecheck
      - run: pnpm -r test

  rust:
    name: Rust sidecar (build, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/agentctl-engine
      - run: cargo build --manifest-path crates/agentctl-engine/Cargo.toml --all-targets
      - run: cargo test --manifest-path crates/agentctl-engine/Cargo.toml

  contracts:
    name: Solidity (Foundry)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
      # contracts/lib is gitignored (forge-std isn't a submodule here — see
      # contracts/ setup notes); fetch it fresh rather than assume it's present.
      - run: git clone --depth 1 https://github.com/foundry-rs/forge-std contracts/lib/forge-std
      - run: forge test --root contracts -vvv

  python:
    name: Python bindings (bridges to the built CLI)
    runs-on: ubuntu-latest
    needs: node
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - run: pip install pytest
      - run: PYTHONPATH=packages/python python3 -m pytest packages/python/tests -q
